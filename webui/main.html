<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color, #e0e0e0);">
        <h3 style="margin: 0; color: #1877F2;">Facebook Pages</h3>
        <span data-fb="status-badge" style="padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #fce4ec; color: #c62828;">Checking...</span>
    </div>

    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
        <button data-fb="test-btn" style="background: #1877F2; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Test Connection</button>
    </div>

    <div data-fb="usage-info" style="font-size: 12px; color: var(--text-secondary, #888); margin-bottom: 12px;"></div>

    <div style="margin-top: 12px; font-size: 11px; color: var(--text-secondary, #999);">
        <strong>Tools:</strong> facebook_post, facebook_read, facebook_comment, facebook_manage, facebook_media, facebook_insights, facebook_page
    </div>
    <div style="margin-top: 4px; font-size: 11px; color: var(--text-secondary, #999);">
        <strong>API:</strong> Facebook Graph API v21.0 — requires Page Access Token with pages_manage_posts permission
    </div>
</div>

<script>
(function() {
    const fetchApi = globalThis.fetchApi || fetch;
    const API_TEST = '/api/plugins/facebook/facebook_test';

    function $(sel) { return document.querySelector('[data-fb="' + sel + '"]'); }

    async function testConnection() {
        const badge = $('status-badge');
        if (!badge) return;
        badge.textContent = 'Testing...';
        badge.style.background = '#fff3e0';
        badge.style.color = '#e65100';
        try {
            const resp = await fetchApi(API_TEST, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: '{}'
            });
            const data = await resp.json();
            if (data.ok) {
                badge.textContent = 'Connected as ' + (data.user || 'unknown');
                badge.style.background = '#e8f5e9';
                badge.style.color = '#2e7d32';
                const usageEl = $('usage-info');
                if (data.usage && usageEl) {
                    const u = data.usage;
                    usageEl.innerHTML =
                        '<strong>This month:</strong> ' +
                        u.posts_created + ' posts, ' +
                        u.comments + ' comments, ' +
                        u.photos_uploaded + ' photos';
                }
            } else {
                badge.textContent = data.error || 'Error';
                badge.style.background = '#fce4ec';
                badge.style.color = '#c62828';
                const usageEl = $('usage-info');
                if (usageEl) usageEl.textContent = '';
            }
        } catch (e) {
            badge.textContent = 'API unavailable';
            badge.style.background = '#fce4ec';
            badge.style.color = '#c62828';
        }
    }

    function init() {
        const btn = $('test-btn');
        if (btn) {
            btn.addEventListener('click', testConnection);
            testConnection();
        } else {
            setTimeout(init, 50);
        }
    }
    init();
})();
</script>
